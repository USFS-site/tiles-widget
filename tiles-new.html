<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Tiles</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #ffffff;
}

/* Responsive grid */
.tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 2rem;
  justify-items: center;
  max-width: 1200px;
  margin: auto;
}

/* Tile styling */
.tile {
  --bg-color: #4863AE;
  --text-color: #ffffff;
  background: linear-gradient(to bottom, var(--bg-color), #232769);
  color: var(--text-color);
  border-radius: 10px !important;
  width: 100%;
  max-width: 220px;
}

/* Icon container */
.tile-icon-container {
  height: 3.5rem;
  width: 3.5rem;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 1.5rem;
  flex-shrink: 0;
}

.tile-icon-container svg,
.tile-icon-container img {
  height: 100%;
  width: 100%;
  object-fit: contain;
}
</style>
</head>

<body class="p-8">

<div class="tile-grid" id="tileContainer">
  <div class="text-center text-gray-500 font-medium col-span-full">
    Loading tiles...
  </div>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const baseSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PA/pub";
const gid = params.get("gid") || "0";
const sheetUrl = `${baseSheetUrl}?gid=${gid}&single=true&output=csv`;

const bgParam = params.get("bg");
const textParam = params.get("text");

const container = document.getElementById("tileContainer");

const genericIconSvg = `
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
stroke="#ffffff" fill="none" stroke-width="2"
stroke-linecap="round" stroke-linejoin="round">
<path d="M12 2L2 7l10 5 10-5-10-5z"></path>
<path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path>
</svg>
`;

async function loadTiles() {

  if (!sheetUrl) {
    container.innerHTML =
      '<div class="text-center text-red-500 font-bold col-span-full">No sheet URL provided.</div>';
    return;
  }

  try {

    const res = await fetch(sheetUrl);
    const text = await res.text();

    const parsed = Papa.parse(text, { header: false });
    let rows = parsed.data;

    container.innerHTML = "";

    rows = rows.filter(row =>
      row.some(cell => cell && cell.trim() !== "")
    );

    rows.slice(1).forEach(row => {

      const title = row[0]?.trim();
      const link = row[1]?.trim();
      const iconContent = row[2]?.trim();
      const isExternalLink = row[3]?.trim().toUpperCase();

      const tileBgColor = bgParam || "#4863AE";
      const tileTextColor = textParam || "#ffffff";

      if (title && link) {

        const a = document.createElement("a");

        a.href = link;

        if (isExternalLink === 'TRUE') {
          a.target = "_blank";
        } else {
          a.target = "_parent";
        }

        a.className =
          "tile flex flex-col items-center text-center p-6 pt-10 shadow-md transition-all duration-300 transform hover:scale-105 hover:shadow-xl min-h-[190px] font-semibold text-xl leading-tight";

        a.style.setProperty('--bg-color', tileBgColor);
        a.style.setProperty('--text-color', tileTextColor);

        const iconContainer = document.createElement("div");
        iconContainer.className = "tile-icon-container";

        if (iconContent && iconContent.startsWith('<svg')) {

          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = iconContent;
          iconContainer.appendChild(tempDiv.firstChild);

        } else if (
          iconContent &&
          (iconContent.startsWith('http') || iconContent.startsWith('/'))
        ) {

          const img = document.createElement("img");

          img.src = iconContent;
          img.alt = title + " icon";

          img.onerror = function() {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = genericIconSvg;
            iconContainer.innerHTML = '';
            iconContainer.appendChild(tempDiv.firstChild);
          };

          iconContainer.appendChild(img);

        } else {

          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = genericIconSvg;
          iconContainer.appendChild(tempDiv.firstChild);

        }

        a.appendChild(iconContainer);

        const titleSpan = document.createElement("span");
        titleSpan.textContent = title;

        a.appendChild(titleSpan);

        container.appendChild(a);

      }

    });

  } catch (err) {

    console.error(err);

    container.innerHTML =
      '<div class="text-center text-red-500 font-bold col-span-full">Error loading tiles: ' +
      err.message +
      '</div>';

  }

}

window.onload = loadTiles;

</script>

</body>
</html>
